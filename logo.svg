<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 430" width="500" height="430">
  <defs>
    <linearGradient id="zGrad" x1="5%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="45%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Z (blau, Verlauf) -->
  <path d="M42,42 L308,42 L308,110 L118,262 L312,262 L312,328 L42,328 L42,264 L230,110 L42,110 Z" fill="url(#zGrad)"/>

  <!-- A (dunkelblau, ohne Querbalken) -->
  <path d="M276,52 L158,330 L193,330 L276,122 L360,330 L395,330 Z" fill="#162544"/>

  <!-- Boden-Linien (Bewegung) -->
  <path d="M85,354 Q270,342 485,356" fill="none" stroke="#162544" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
  <path d="M130,364 Q290,354 470,366" fill="none" stroke="#162544" stroke-width="1" stroke-linecap="round" opacity="0.18"/>

  <!-- Auto-Silhouette (Sportwagen, nur Kontur) -->
  <!-- Dachprofil -->
  <path d="M228,332 C232,305 272,280 325,270 C362,263 408,266 448,278 C472,286 492,302 500,320"
        fill="none" stroke="#162544" stroke-width="2.2" stroke-linecap="round"/>
