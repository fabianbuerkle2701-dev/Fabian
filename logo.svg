  <path d="M228,340 L244,340" fill="none" stroke="#162544" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M283,340 L418,340" fill="none" stroke="#162544" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M457,340 L500,340 L500,320" fill="none" stroke="#162544" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Heck -->
  <path d="M228,332 L224,340" fill="none" stroke="#162544" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Hinterrad -->
  <circle cx="263" cy="343" r="16" fill="none" stroke="#162544" stroke-width="2.2"/>
  <!-- Vorderrad -->
  <circle cx="438" cy="343" r="16" fill="none" stroke="#162544" stroke-width="2.2"/>

  <!-- Text -->
  <text x="250" y="408"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="25"
        fill="#162544"
        text-anchor="middle"
        letter-spacing="7">ZEKAI ACIGÖZ</text>

  <!-- Dekorationsstriche -->
  <line x1="42" y1="403" x2="66" y2="403" stroke="#2563eb" stroke-width="2"/>
  <line x1="434" y1="403" x2="458" y2="403" stroke="#2563eb" stroke-width="2"/>
